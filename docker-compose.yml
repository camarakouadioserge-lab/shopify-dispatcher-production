
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dispatcher
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - db
      - redis
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/dispatcher?schema=public
      REDIS_URL: redis://redis:6379
      APP_BASE_URL: http://localhost:3000

  worker:
    build: .
    restart: unless-stopped
    depends_on:
      - db
      - redis
    command: sh -c "npx prisma migrate deploy && npm run worker"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/dispatcher?schema=public
      REDIS_URL: redis://redis:6379
      APP_BASE_URL: http://localhost:3000

volumes:
  postgres_data:
